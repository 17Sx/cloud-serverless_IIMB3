<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Invitation</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background-color: #f4f4f7;
      margin: 0;
      padding: 0;
    }
    .container {
      max-width: 580px;
      margin: 40px auto;
      background: #ffffff;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .header {
      background-color: #2563eb;
      color: #ffffff;
      padding: 24px 32px;
      text-align: center;
    }
    .header h1 {
      margin: 0;
      font-size: 22px;
    }
    .body {
      padding: 32px;
      color: #333333;
      line-height: 1.6;
    }
    .body p {
      margin: 0 0 16px;
    }
    .cta {
      text-align: center;
      margin: 24px 0;
    }
    .cta a {
      display: inline-block;
      background-color: #2563eb;
      color: #ffffff;
      text-decoration: none;
      padding: 12px 32px;
      border-radius: 6px;
      font-weight: 600;
      font-size: 16px;
    }
    .footer {
      padding: 16px 32px;
      text-align: center;
      font-size: 12px;
      color: #999999;
      border-top: 1px solid #eeeeee;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Invitation</h1>
    </div>
    <div class="body">
      <p>Bonjour,</p>
      <p>
        <strong>{{inviterName}}</strong> vous invite a rejoindre l'equipe
        <strong>{{teamName}}</strong>.
      </p>
      <div class="cta">
        <a href="{{inviteLink}}">Accepter l'invitation</a>
      </div>
      <p>
        Si vous ne souhaitez pas rejoindre cette equipe, vous pouvez ignorer cet email.
      </p>
    </div>
    <div class="footer">
      <p>Cet email a ete envoye automatiquement. Merci de ne pas y repondre.</p>
    </div>
  </div>
</body>
</html>
