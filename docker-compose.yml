services:
  migrate:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - ./scripts:/app/scripts
      - ./api/migrations:/app/api/migrations
    environment:
      DATABASE_URL: postgres://app:app@db:5432/app
    command: >
      sh -c "pip install -q -r scripts/requirements.txt &&
      python scripts/migrate.py"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: app
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app"]
      interval: 2s
      timeout: 5s
      retries: 10

  api:
    build: ./api
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgres://app:app@db:5432/app
      PORT: 3001
      TRUSTED_ORIGINS: http://localhost:3000
      BETTER_AUTH_SECRET: dev-secret-change-me
      BETTER_AUTH_URL: http://localhost:3001
      AWS_REGION: eu-west-3
      S3_ASSETS_BUCKET: cloud-serverless-iimb3-assets
      S3_BACKUP_BUCKET: cloud-serverless-iimb3-assets
    depends_on:
      - db

  front:
    build: ./code
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
      NEXT_PUBLIC_ENV: development
    command: npm run dev
    depends_on:
      - api

volumes:
  pgdata:
