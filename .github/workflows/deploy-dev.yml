name: Deploy Dev

on:
  push:
    branches:
      - dev

jobs:
  deploy-dev:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: code/package-lock.json

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Install npm dependencies
        working-directory: code
        run: npm ci

      - name: Lint
        working-directory: code
        run: npm run lint

      - name: Deploy to dev
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          S3_BUCKET_USER_DEV: ${{ secrets.S3_BUCKET_USER_DEV }}
          S3_BUCKET_ADMIN_DEV: ${{ secrets.S3_BUCKET_ADMIN_DEV }}
          CF_ID_USER_DEV: ${{ secrets.CF_ID_USER_DEV }}
          CF_ID_ADMIN_DEV: ${{ secrets.CF_ID_ADMIN_DEV }}
        run: python scripts/deploy.py dev
