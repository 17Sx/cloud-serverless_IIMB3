name: Deploy Prd

on:
  push:
    branches:
      - main

jobs:
  deploy-prd:
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: code/package-lock.json

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Install frontend dependencies
        working-directory: code
        run: npm ci

      - name: Lint frontend
        working-directory: code
        run: npm run lint

      - name: Install API dependencies
        working-directory: api
        run: bun install --frozen-lockfile

      - name: Deploy frontend to prd
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          S3_BUCKET_USER_PRD: ${{ secrets.S3_BUCKET_USER_PRD }}
          S3_BUCKET_ADMIN_PRD: ${{ secrets.S3_BUCKET_ADMIN_PRD }}
          CF_ID_USER_PRD: ${{ secrets.CF_ID_USER_PRD }}
          CF_ID_ADMIN_PRD: ${{ secrets.CF_ID_ADMIN_PRD }}
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_USER_SITE_URL: ${{ secrets.NEXT_PUBLIC_USER_SITE_URL }}
        run: python scripts/deploy.py prd

      - name: Run migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_PRD }}
        run: python scripts/migrate.py prd

      - name: Deploy API to prd
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          LAMBDA_FUNCTION_PRD: ${{ secrets.LAMBDA_FUNCTION_PRD }}
          OAUTH_GOOGLE_CLIENT_ID: ${{ secrets.OAUTH_GOOGLE_CLIENT_ID }}
          OAUTH_GOOGLE_CLIENT_SECRET: ${{ secrets.OAUTH_GOOGLE_CLIENT_SECRET }}
          OAUTH_GITHUB_CLIENT_ID: ${{ secrets.OAUTH_GITHUB_CLIENT_ID_PRD }}
          OAUTH_GITHUB_CLIENT_SECRET: ${{ secrets.OAUTH_GITHUB_CLIENT_SECRET_PRD }}
          BETTER_AUTH_URL_PRD: ${{ secrets.BETTER_AUTH_URL_PRD }}
          BETTER_AUTH_SECRET_PRD: ${{ secrets.BETTER_AUTH_SECRET_PRD }}
          TRUSTED_ORIGINS_PRD: ${{ secrets.TRUSTED_ORIGINS_PRD }}
        run: python scripts/deploy-api.py prd
